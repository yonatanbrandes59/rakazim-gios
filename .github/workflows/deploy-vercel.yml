name: Deploy to Vercel

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Notify deploy
        run: |
          echo "✅ Push to master detected — Vercel auto-deploy triggered"
          echo "📋 Survey URL: https://rakazim-gios.vercel.app/apply"
          echo "🔧 Admin URL:  https://rakazim-gios.vercel.app/admin"
          echo ""
          echo "Environment variables are configured via vercel.json"
          echo "If you need to update secrets, go to:"
          echo "https://vercel.com/yonatanbrandes59/rakazim-gios/settings/environment-variables"
